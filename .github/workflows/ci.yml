name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: npm install -g corepack@latest
      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck
        continue-on-error: true

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Check for Linux screenshot baselines
        id: check-baselines
        run: |
          if ls e2e/__screenshots__/**/*-linux.png 1>/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate screenshot baselines
        if: steps.check-baselines.outputs.exists == 'false'
        run: pnpm vitest run --update

      - name: Run tests
        if: steps.check-baselines.outputs.exists == 'true'
        run: pnpm vitest run

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: e2e/__screenshots__/
          retention-days: 30
